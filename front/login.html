<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Login-Sconicribe</title>
    <link rel="stylesheet" href="login.css">
    <script src="config.js"></script>
</head>
<body>

    <div class="animation-side">
    <div id="lottie-animation" style="width:400px;height:400px;"></div>
</div>

    <div class="container">
        <div class="card">

    <!-- APP BRANDING -->
    <div class="app-brand">
        <h2 class="app-name">SconicScribe</h2>
        <p class="app-tagline">Think • Speak • Remember</p>
    </div>

    <div class="header">
        <h1 id="title">Welcome Back</h1>
        <p id="subtitle">Sign in to continue</p>
    </div>


            <form id="authForm" novalidate>
                <div class="form-group" id="usernameGroup" style="display: none;">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Enter your username">
                    </div>
                </div>
<div class="form-group" id="ageGroup" style="display:none;">
    <label for="age">Age</label>
    <div class="input-wrapper">
        <input type="number" id="age" name="age" placeholder="Enter your age" min="1" max="120">
    </div>
</div>

<div class="form-group" id="genderGroup" style="display:none;">
    <label for="gender">Gender</label>
    <div class="input-wrapper">
        <select id="gender" name="gender">
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
    </div>
</div>

<div class="form-group" id="phoneGroup" style="display:none;">
    <label for="phone">Phone Number</label>
    <div class="input-wrapper">
        <input type="tel" id="phone" name="phone" placeholder="Enter phone number" maxlength="10">
    </div>
</div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <path d="m2 7 10 7 10-7"></path>
                        </svg>
                        <input type="text" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <small id="emailError" class="error-text"></small>
                </div>

              <div class="form-group">
    <label for="password">Password</label>
    <div class="input-wrapper">
        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        
        <button type="button" id="togglePassword" class="password-toggle" aria-label="Toggle password visibility">
            <svg id="eyeIcon" class="eye-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg id="eyeOffIcon" class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
        </button>
    </div>
    
</div>

                <div class="forgot-password" id="forgotPassword">
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>
            <div id="g_id_onload"
     data-client_id="YOUR_CLIENT_ID"
     data-callback="handleGoogleResponse">
</div>

<div class="g_id_signin" data-type="standard"></div>


            <div class="toggle-auth">
                <p id="toggleText">
                    Don't have an account? 
                    <button type="button" id="toggleBtn">Sign Up</button>
                </p>
            </div>
        </div>
    </div>
    <!-- <div id="googleBtn"></div> -->


    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="login.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    lottie.loadAnimation({
        container: document.getElementById("lottie-animation"),
        renderer: "svg",
        loop: true,
        autoplay: true,
        path: "assets/register.json"
    });

});
</script>


</body>
</html>
